services:
  app:
    build: .
    command: python src/app.py
    depends_on:
      - postgres
    env_file: ".envs/app.env"

  postgres:
    image: postgres:18.3
    environment:
      POSTGRES_USER: dbos
      POSTGRES_PASSWORD: password
      POSTGRES_DB: dbos

  postgres_conductor:
    image: postgres:16
    container_name: dbos-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: dbos
      POSTGRES_DB: dbos_conductor
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
  conductor:
    image: dbosdev/conductor
    container_name: dbos-conductor
    env_file: ".envs/conductor.env"
    environment:
      DBOS__CONDUCTOR_DB_URL: postgresql://postgres:${PGPASSWORD:-dbos}@dbos-postgres:5432/dbos_conductor?sslmode=disable
    ports:
      - "8090:8090"
    depends_on:
      postgres_conductor:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/healthz"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
  console:
    image: dbosdev/console
    container_name: dbos-console
    environment:
      DBOS_CONDUCTOR_URL: "${DBOS_CONDUCTOR_URL:-conductor:8090}"
    ports:
      - "${DBOS_CONSOLE_PORT:-80}:80"
    depends_on:
      conductor:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
volumes:
  postgres_data:
